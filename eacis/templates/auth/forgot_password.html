{% extends 'base.html' %}
{% block title %}Forgot Password — E-ACIS{% endblock %}
{% block content %}
<div class="page-center" style="padding: var(--sp-12) var(--sp-6);">
  <div class="glass-card glass-card--interactive" style="max-width: 480px; width: 100%; padding: var(--sp-12) var(--sp-10);">
    <div class="text-center" style="margin-bottom: var(--sp-8);">
      <h1 class="type-display-md" style="color: var(--grey-900);">Reset your password</h1>
      <p class="type-body-md text-muted" style="margin-top: var(--sp-3);">Enter the email address on your account and we will send a verification code.</p>
    </div>

    {% if error %}
    <div class="form-error" role="alert" style="margin-bottom: var(--sp-5);">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth_forgot_password') }}" class="form-stack" data-enhance="submit-loading">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input id="email" name="email" type="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn--primary btn--full">Send Reset Code</button>
    </form>

    <div class="text-center mt-8">
      <a href="{{ url_for('auth_login') }}" class="type-body-sm">Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
