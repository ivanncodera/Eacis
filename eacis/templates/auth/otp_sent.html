{% extends 'base.html' %}
{% block title %}OTP Sent{% endblock %}
{% block content %}
<div class="page-content" style="padding: var(--sp-12);">
  <div class="glass-card p-10" style="max-width:680px; margin: 0 auto;">
    <h2 class="type-h4">Verification Code Sent</h2>
    <p class="type-body-sm text-muted">We've sent a one-time verification code to your email address. Check your inbox and enter the code on the verification page.</p>
    <div style="margin-top: var(--sp-6);">
      <a href="{{ url_for('auth_otp_verify') }}" class="btn btn--primary">Enter Verification Code</a>
      <a href="{{ url_for('auth_login') }}" class="btn btn--link">Back to Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
