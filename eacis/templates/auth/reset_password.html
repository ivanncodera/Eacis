{% extends 'base.html' %}
{% block title %}Set New Password — E-ACIS{% endblock %}
{% block content %}
<div class="page-center" style="padding: var(--sp-12) var(--sp-6);">
  <div class="glass-card glass-card--interactive" style="max-width: 480px; width: 100%; padding: var(--sp-12) var(--sp-10);">
    <div class="text-center" style="margin-bottom: var(--sp-8);">
      <h1 class="type-display-md" style="color: var(--grey-900);">Set a new password</h1>
      <p class="type-body-md text-muted" style="margin-top: var(--sp-3);">Choose a strong password for your E-ACIS account.</p>
    </div>

    {% if error %}
    <div class="form-error" role="alert" style="margin-bottom: var(--sp-5);">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth_reset_password') }}" class="form-stack" data-enhance="submit-loading">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <input id="password" name="password" type="password" class="form-input" minlength="8" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" class="form-input" minlength="8" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn--primary btn--full">Update Password</button>
    </form>

    <div class="text-center mt-8">
      <a href="{{ url_for('auth_login') }}" class="type-body-sm">Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
