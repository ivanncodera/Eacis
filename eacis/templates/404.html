{% extends "base.html" %}
{% block title %}Page Not Found - E-ACIS{% endblock %}
{% block content %}
<main class="main-content main-content--center" style="min-height: 80vh;">
  <div class="glass-card glass-card--interactive reveal" style="text-align: center; max-width: 540px; padding: var(--sp-12) var(--sp-10);">
    <div style="width: 100px; height: 100px; background: var(--brand-primary-subtle-2); border: 1px solid var(--brand-primary-subtle); border-radius: var(--radius-2xl); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--sp-8); color: var(--brand-primary);">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
    </div>
    <h1 class="type-display-lg mb-1" style="color: var(--grey-900);">404</h1>
    <h2 class="type-h3 mb-4" style="color: var(--grey-700);">Lost in the Hub?</h2>
    <p class="type-body-md mb-10" style="color: var(--grey-500); max-width: 400px; margin-left: auto; margin-right: auto;">The page you are looking for has been moved or disconnected from our smart network.</p>
    <div style="display: flex; gap: var(--sp-4); justify-content: center; flex-wrap: wrap;">
      <a href="/" class="btn btn--primary btn--xl">Return Home</a>
      <a href="/shop" class="btn btn--ghost btn--xl">Shop Catalog</a>
    </div>
  </div>
</main>
{% endblock %}
