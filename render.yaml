services:
  - type: web
    name: eacis
    env: python
    plan: free
    buildCommand: pip install -r eacis/requirements.txt
    startCommand: sh -c "flask --app wsgi:app db upgrade; gunicorn -w 4 -b 0.0.0.0:$PORT wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: FLASK_ENV
        value: production
      - key: USE_DEV_SEEDS
        value: "False"
